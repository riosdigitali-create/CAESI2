<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sube tu documentación · CAESI</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px}
  .card{width:100%;max-width:600px;background:#1e293b;border:1px solid #334155;border-radius:18px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .brand{font-weight:800;letter-spacing:.5px;color:#38bdf8;font-size:14px}
  h1{font-size:23px;margin:6px 0 4px}
  p.sub{margin:0 0 18px;color:#94a3b8;font-size:14px;line-height:1.55}
  label{display:block;font-size:13px;color:#cbd5e1;margin:14px 0 6px;font-weight:600}
  input[type=text],textarea,select{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:15px;font-family:inherit}
  input:focus,textarea:focus,select:focus{outline:none;border-color:#38bdf8}
  input[readonly]{opacity:.85}
  textarea{min-height:76px;resize:vertical}
  .hint{font-size:12px;color:#64748b;margin-top:4px}
  .btns{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
  .pick{flex:1;min-width:170px;border:2px dashed #475569;border-radius:12px;padding:16px;text-align:center;cursor:pointer;background:#0f172a;font-size:13px;color:#cbd5e1}
  .pick:hover{border-color:#38bdf8;background:#0b1220}
  .pick b{display:block;font-size:14px;color:#e2e8f0;margin-bottom:2px}
  #drop{margin-top:10px;border:2px dashed #334155;border-radius:12px;padding:16px;text-align:center;color:#64748b;font-size:12px}
  #drop.over{border-color:#38bdf8;color:#cbd5e1}
  ul.files{list-style:none;padding:0;margin:12px 0 0;font-size:13px;max-height:230px;overflow:auto}
  ul.files li{display:flex;justify-content:space-between;gap:8px;padding:8px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;margin-bottom:6px}
  ul.files li .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  ul.files li .st{color:#94a3b8;flex:0 0 auto}
  ul.files li.ok .st{color:#22c55e}
  ul.files li.err .st{color:#ef4444}
  button.send{margin-top:18px;width:100%;padding:14px;border:0;border-radius:10px;background:#38bdf8;color:#04293a;font-weight:800;font-size:16px;cursor:pointer}
  button.send:disabled{opacity:.5;cursor:default}
  .done{margin-top:16px;padding:14px;border-radius:10px;background:#064e3b;border:1px solid #10b981;color:#d1fae5;font-size:14px;display:none}
  .foot{margin-top:18px;color:#64748b;font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="brand">CAESI</div>
  <h1>Sube tu documentación</h1>
  <p class="sub">Sube aquí los documentos de tu empresa. No necesitas cuenta ni contraseña. Tus archivos llegan directo y seguros a CAESI.</p>

  <label>Empresa *</label>
  <input id="empresa" type="text" placeholder="Nombre de tu empresa" autocomplete="off">

  <label>Predio / Sucursal (si aplica)</label>
  <input id="predio" type="text" placeholder="Ej. Culturas 153" autocomplete="off">

  <label>Tu nombre / contacto *</label>
  <input id="ing" type="text" placeholder="Quién sube los documentos" autocomplete="off">

  <label>¿Qué estás subiendo? (notas)</label>
  <textarea id="desc" placeholder="Ej. Estudio de ruido 2026 y programa interno de protección civil."></textarea>

  <label>Documentos *</label>
  <div class="btns">
    <div class="pick" id="pickFolder"><b>Subir carpeta completa</b>elige la carpeta</div>
    <div class="pick" id="pickFiles"><b>Subir archivos</b>elige uno o varios</div>
  </div>
  <div id="drop">o arrastra aquí tus archivos</div>
  <input id="folder" type="file" webkitdirectory directory multiple style="display:none">
  <input id="file" type="file" multiple style="display:none">
  <ul class="files" id="list"></ul>

  <button class="send" id="btn">Enviar documentos</button>
  <div class="done" id="done"></div>
  <div class="foot">Conexión segura · CAESI Cumplimiento STPS</div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPA_URL='https://vbihkgnydgoqocdnygzf.supabase.co';
const SUPA_KEY='sb_publishable_sAVPh0l7aO4QGbGBRMAlvg_aTbEFdTt';
const MAKE_HOOK='https://hook.us2.make.com/mjglqyq413l9l65qdqwkqwyb2jc8glyq';
const sb = createClient(SUPA_URL, SUPA_KEY);
const $ = (id)=>document.getElementById(id);

// Enlace personalizado opcional: ?empresa=Garrido&predio=Culturas%20153&ing=Juan&lock=1
// (NO se muestra ninguna lista de empresas: privacidad entre clientes)
const params = new URLSearchParams(location.search);
if(params.get('empresa')){ $('empresa').value = params.get('empresa'); }
if(params.get('predio')){ $('predio').value = params.get('predio'); }
if(params.get('ing')){ $('ing').value = (params.get('ing')||'').replace(/[-_]+/g,' ').trim(); }
if(params.get('lock')==='1'){ if($('empresa').value) $('empresa').setAttribute('readonly','readonly'); if($('predio').value) $('predio').setAttribute('readonly','readonly'); }

function slug(s){ let x=(s||'').toString().toLowerCase().normalize('NFD'); let out=''; for(let i=0;i<x.length;i++){ const c=x[i]; if(c>='a'&&c<='z'){out+=c;} else if(c>='0'&&c<='9'){out+=c;} else {out+='-';} } return out.replace(/-+/g,'-').replace(/^-|-$/g,''); }
function sanSeg(s){ let x=(s||'').toString(); let out=''; for(let i=0;i<x.length;i++){ const c=x[i]; const ok=(c>='a'&&c<='z')||(c>='A'&&c<='Z')||(c>='0'&&c<='9')||c==='.'||c==='-'||c==='_'||c===' '; out+= ok?c:'_'; } return out.replace(/\s+/g,'_'); }

let files=[];
function render(){ const ul=$('list'); ul.innerHTML=''; files.forEach((f,i)=>{ const li=document.createElement('li'); li.id='f'+i; const a=document.createElement('span'); a.className='nm'; a.textContent=(f.webkitRelativePath||f.name); const b=document.createElement('span'); b.className='st'; b.textContent='en espera'; li.appendChild(a); li.appendChild(b); ul.appendChild(li); }); }
function addFiles(fl){ for(const f of fl){ files.push(f); } render(); }
$('pickFolder').addEventListener('click', ()=>$('folder').click());
$('pickFiles').addEventListener('click', ()=>$('file').click());
$('folder').addEventListener('change', e=>addFiles(e.target.files));
$('file').addEventListener('change', e=>addFiles(e.target.files));
const drop=$('drop');
drop.addEventListener('dragover', e=>{ e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', ()=>drop.classList.remove('over'));
drop.addEventListener('drop', e=>{ e.preventDefault(); drop.classList.remove('over'); if(e.dataTransfer&&e.dataTransfer.files) addFiles(e.dataTransfer.files); });

function notificar(empresa, predio, ingeniero, archivo, descripcion, ruta, tamano){
  const abrir = SUPA_URL + '/functions/v1/abrir?path=' + encodeURIComponent(ruta);
  try { fetch(MAKE_HOOK, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ empresa, predio, origen:'cliente', ingeniero, archivo, descripcion, ruta, tamano, abrir }) }).catch(()=>{}); } catch(e){}
}

$('btn').addEventListener('click', async ()=>{
  const emp=$('empresa').value.trim(), pred=$('predio').value.trim(), ingRaw=$('ing').value.trim(), descRaw=$('desc').value.trim();
  if(!emp){ alert('Escribe el nombre de tu empresa'); return; }
  if(!ingRaw){ alert('Escribe tu nombre / contacto'); return; }
  if(!files.length){ alert('Agrega la carpeta o los archivos'); return; }
  const empS=slug(emp)||'sin-empresa', predS=slug(pred);
  $('btn').disabled=true; $('btn').textContent='Enviando…';
  let okCount=0;
  for(let i=0;i<files.length;i++){
    const f=files[i], li=$('f'+i), st=li.querySelector('.st'); st.textContent='subiendo…';
    const rel=(f.webkitRelativePath&&f.webkitRelativePath.length)?f.webkitRelativePath:f.name;
    const parts=rel.split('/').map(sanSeg).filter(p=>p.length);
    const fname=parts.length?parts.pop():'archivo';
    const path=[empS, predS, 'cliente'].filter(Boolean).concat(parts).join('/') + '/' + Date.now() + '_' + fname;
    const r=await sb.storage.from('intake').upload(path, f, { upsert:false, contentType:f.type||'application/octet-stream' });
    if(r.error){ li.className='err'; st.textContent='error'; }
    else { li.className='ok'; st.textContent='listo'; okCount++; notificar(emp, pred, ingRaw, f.name, descRaw, path, f.size); }
  }
  const d=$('done'); d.style.display='block';
  d.textContent = okCount===files.length ? ('¡Listo! Recibimos '+okCount+' documento(s). Gracias, '+ingRaw+'.') : ('Subidos '+okCount+' de '+files.length+'. Reintenta los que fallaron.');
  $('btn').textContent = okCount===files.length ? 'Enviado' : 'Reintentar';
  $('btn').disabled = okCount===files.length;
});
</script>
</body>
</html>
